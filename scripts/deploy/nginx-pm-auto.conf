# ============================================================
#  Nginx config for pm-auto.dslyy.com
#  Place at: /etc/nginx/conf.d/pm-auto.conf
# ============================================================

server {
    listen 80;
    server_name pm-auto.dslyy.com;

    # Redirect HTTP to HTTPS (optional but recommended)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pm-auto.dslyy.com;

    # SSL certificates (use certbot / acme.sh to obtain)
    ssl_certificate     /etc/nginx/ssl/pm-auto.dslyy.com.pem;
    ssl_certificate_key /etc/nginx/ssl/pm-auto.dslyy.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/pm-auto;
    index index.html;

    # Latest version manifest (for auto-update)
    location = /latest.json {
        alias /var/www/pm-auto/latest.json;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # Release packages
    location /releases/ {
        alias /var/www/pm-auto/releases/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # Allow large file downloads
        client_max_body_size 0;

        # Cache release files for 1 day
        add_header Cache-Control "public, max-age=86400";
    }

    # Browser extension download (CRX or zip)
    location /extension/ {
        alias /var/www/pm-auto/extension/;
        autoindex on;
        add_header Cache-Control "public, max-age=3600";
    }

    # Landing page / install guide
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
